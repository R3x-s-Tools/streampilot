name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  source:
    name: Source ZIP
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source ZIP
        shell: bash
        run: |
          python build/scripts/build_source_zip.py --version "${GITHUB_REF_NAME}"
          cd release
          sha256sum "DadR3x_Command_Center_${GITHUB_REF_NAME}_Source.zip" > "DadR3x_Command_Center_${GITHUB_REF_NAME}_Source.zip.sha256"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ steps.version.outputs.version }}
          path: |
            release/*.zip
            release/*.sha256

  windows:
    name: Windows
    runs-on: windows-latest
    needs: source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows package
        shell: pwsh
        run: |
          build/scripts/build_windows.ps1 -Version "${env:GITHUB_REF_NAME}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.source.outputs.version }}
          path: |
            release/*.zip
            release/*.sha256

  macos-intel:
    name: macOS Intel x86_64
    runs-on: macos-latest
    needs: source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS Intel package
        shell: bash
        run: |
          bash build/scripts/build_mac.sh "${GITHUB_REF_NAME}" "Intel" "x86_64"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-${{ needs.source.outputs.version }}
          path: |
            release/*.zip
            release/*.sha256

  macos-apple-silicon:
    name: macOS Apple Silicon arm64
    runs-on: macos-14
    needs: source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS Apple Silicon package
        shell: bash
        run: |
          bash build/scripts/build_mac.sh "${GITHUB_REF_NAME}" "AppleSilicon" "arm64"

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-apple-silicon-${{ needs.source.outputs.version }}
          path: |
            release/*.zip
            release/*.sha256

  verify:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    needs:
      - source
      - windows
      - macos-intel
      - macos-apple-silicon

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify expected files
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.source.outputs.version }}"

          mkdir -p release-files
          find artifacts -type f -name "*.zip" -exec cp {} release-files/ \;
          find artifacts -type f -name "*.sha256" -exec cp {} release-files/ \;

          echo "Release files:"
          ls -la release-files

          expected=(
            "DadR3x_Command_Center_${VERSION}_Source.zip"
            "DadR3x_Command_Center_${VERSION}_Windows.zip"
            "DadR3x_Command_Center_${VERSION}_macOS_Intel_x86_64.zip"
            "DadR3x_Command_Center_${VERSION}_macOS_AppleSilicon_arm64.zip"
          )

          for file in "${expected[@]}"; do
            if [[ ! -f "release-files/${file}" ]]; then
              echo "Missing expected artifact: ${file}"
              exit 1
            fi

            if [[ ! -f "release-files/${file}.sha256" ]]; then
              echo "Missing expected checksum: ${file}.sha256"
              exit 1
            fi
          done

          cd release-files
          sha256sum -c *.sha256

      - name: Upload verified release bundle
        uses: actions/upload-artifact@v4
        with:
          name: verified-release-${{ needs.source.outputs.version }}
          path: release-files/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - source
      - verify

    steps:
      - name: Download verified release bundle
        uses: actions/download-artifact@v4
        with:
          name: verified-release-${{ needs.source.outputs.version }}
          path: release-files

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
